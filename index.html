<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>فاست بوكس | Fast Box</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --red:#e50914;
  --bg:#0a0a0a;
  --card:#141414;
  --card2:#1c1c1c;
  --border:#2a2a2a;
  --muted:#999;
  --gold:#f5c518;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:#fff;
  font-family:'Cairo',sans-serif;
  overflow-x:hidden;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(10,10,10,.97);
  padding:0 40px;
  height:68px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(229,9,20,.3);
}

.logo{
  font-size:24px;
  font-weight:900;
  letter-spacing:2px;
  color:var(--red);
  cursor:pointer;
}

nav{
  display:flex;
  gap:4px;
}

nav a{
  color:var(--muted);
  text-decoration:none;
  padding:8px 14px;
  border-radius:6px;
  font-size:15px;
  transition:.2s;
  cursor:pointer;
}

nav a:hover{
  color:#fff;
  background:rgba(255,255,255,.07);
}

header button{
  background:var(--red);
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:700;
}

.sec{
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
}

.poster{
  width:100%;
  height:320px;
  object-fit:cover;
  background:#222;
}
</style>
</head>

<body>

<header>
  <div class="logo">FAST BOX</div>

  <nav>
    <a href="#">الرئيسية</a>
    <a href="#">الأفلام</a>
    <a href="#">المسلسلات</a>
  </nav>

  <button>⚙ الإدارة</button>
</header>

<section class="sec">

  <div class="grid">

    <div class="card">
      <img class="poster" src="https://via.placeholder.com/400x600">
    </div>

    <div class="card">
      <img class="poster" src="https://via.placeholder.com/400x600">
    </div>

  </div>

</section>

</body>
</html>
